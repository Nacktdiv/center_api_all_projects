name: Deploy to cPanel
on:
  push:
    branches: [ main ] # Jalankan setiap push ke branch main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 163.223.227.37
          username: dzxtssbx
          port: 6401
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            if [ ! -d "api-center/.git" ]; then
              echo "Folder belum ada atau bukan git repo, melakukan clone..."
              git clone https://github.com/Nacktdiv/center_api_all_projects.git api-center
            fi

            echo "sudah diinstall"

            source /home/dzxtssbx/nodevenv/api-center/24/bin/activate && cd /home/dzxtssbx/api-center

            git pull origin main 

            npm install
            touch tmp/restart.txt
            echo "Deploy Selesai!"
        
